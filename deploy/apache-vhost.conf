<VirtualHost *:80>
    DocumentRoot /var/www/html/app/public

    <Directory /var/www/html/app/public>
        AllowOverride All
        Require all granted
    </Directory>

    # The SQLite database lives outside the web root; deny it explicitly too.
    <Directory /var/www/html/app/data>
        Require all denied
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
