# Example Nginx + PHP-FPM config (alternative to the Docker/Apache setup).
#
# For login rate-limiting, add this to the http { } block:
#   limit_req_zone $binary_remote_addr zone=auth:10m rate=20r/m;

server {
    listen 80;
    server_name _;
    root /var/www/casino/app/public;   # <-- adjust to where you deployed app/public
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Rate-limit auth endpoints (uncomment after defining the zone above)
    location ~ ^/api/(login|register)$ {
        # limit_req zone=auth burst=10 nodelay;
        try_files $uri /router.php$is_args$args;
    }

    # Static assets
    location ~* \.(css|js|svg|png|jpg|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        access_log off;
    }

    # Everything else -> PHP front controller
    location / {
        try_files $uri /router.php$is_args$args;
    }

    location = /router.php {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;        # or unix:/run/php/php8.2-fpm.sock
        fastcgi_param SCRIPT_FILENAME $document_root/router.php;
    }

    # Never expose the database, logs or VCS metadata
    location ~ /(data|\.git|\.ht) { return 404; }
}
