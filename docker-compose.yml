services:
  casino:
    build: .
    ports:
      - "8080:80"            # browse http://localhost:8080
    environment:
      CASINO_ADMINS: "Admin"            # comma-separated admin usernames
      CASINO_STARTING_BALANCE: "1000"
    volumes:
      - casino-data:/var/www/html/app/data   # persist the SQLite database
    restart: unless-stopped

volumes:
  casino-data:
