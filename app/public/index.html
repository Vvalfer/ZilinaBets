<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RETRO CASINO '85</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>

  <header id="topbar" class="topbar hidden">
    <div class="brand" id="brandHome">
      <span class="brand-neon">RETRO</span><span class="brand-sub">CASINO</span>
    </div>
    <div class="wallet" id="wallet">
      <button class="btn-ghost" id="lobbyBtn" title="Back to lobby">▟ Lobby</button>
      <button class="btn-ghost hidden" id="adminBtn" title="Admin panel">★ Admin</button>
      <div class="chips" title="Your chips">
        <span class="chip-icon">◉</span>
        <span id="balance">0</span>
        <span class="chips-label">chips</span>
      </div>
      <div class="who">
        <span id="username">—</span>
        <button class="btn-ghost" id="logoutBtn">Logout</button>
      </div>
    </div>
  </header>

  <main id="view" class="view"></main>

  <div id="toast" class="toast hidden"></div>

  <footer class="footer">
    <span>Virtual chips only · no real money</span>
    <span class="footer-dim">Server-authoritative outcomes powered by the Casino Engine</span>
  </footer>

  <!-- API + shared helpers -->
  <script src="/assets/js/api.js"></script>
  <!-- Games self-register into Casino.games -->
  <script src="/assets/js/games/roulette.js"></script>
  <script src="/assets/js/games/slots.js"></script>
  <script src="/assets/js/games/blackjack.js"></script>
  <script src="/assets/js/games/craps.js"></script>
  <script src="/assets/js/games/duckrace.js"></script>
  <!-- App orchestrator (must load last) -->
  <script src="/assets/js/app.js"></script>
</body>
</html>
